name: Issue Context Assignment
on:
  issue_comment:
    types: [created]
permissions:
  issues: write
  contents: read
concurrency:
  group: issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: false
jobs:
  assign:
    if: github.event.issue.pull_request == null && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v8
        with:
          script: |
            const comment = (context.payload.comment.body || '').trim();
            if (!/^\/assign(\s+\w+)?$/i.test(comment)) return;
            const owner=context.repo.owner, repo=context.repo.repo, issue_number=context.payload.issue.number;
            const issue=(await github.rest.issues.get({owner,repo,issue_number})).data;
            if (issue.state !== 'open' || issue.locked) return;
            if ((issue.assignees || []).length > 0) return;
            const claimant = context.payload.comment.user.login;
            await github.rest.issues.addAssignees({owner,repo,issue_number,assignees:[claimant]});
            const marker='<!-- assignment-status -->';
            const body=`${marker}\n✅ Assigned to @${claimant}. One assignee maximum.`;
            const {data: comments}=await github.rest.issues.listComments({owner,repo,issue_number,per_page:100});
            const existing=comments.find(c=>c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({owner,repo,comment_id:existing.id,body});
            else await github.rest.issues.createComment({owner,repo,issue_number,body});
