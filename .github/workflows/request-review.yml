name: 👥 Request Reviewers (Stage 2)

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - ready_for_review
      - synchronize

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-reviewers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-reviewers:
    name: Smart Mentor Routing

    runs-on: ubuntu-latest

    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved')

    steps:
      # ----------------------------------------
      # CHECKOUT
      # ----------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------
      # SETUP NODE
      # ----------------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ----------------------------------------
      # LOAD ACTIVE MENTORS
      # ----------------------------------------

      - name: Select active mentors
        id: mentors
        run: |
          node .github/scripts/select-active-mentors.js \
            > selected-mentors.json

          cat selected-mentors.json

      # ----------------------------------------
      # REQUEST REVIEWERS
      # ----------------------------------------

      - name: Stage 2 Reviewer Routing
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const fs = require('fs');

            const owner =
              context.repo.owner;

            const repo =
              context.repo.repo;

            const pr =
              context.payload.pull_request;

            const prNumber =
              pr.number;

            const prAuthor =
              pr.user.login.toLowerCase();

            const labels =
              (pr.labels || [])
                .map(l => l.name.toLowerCase());

            // ----------------------------------------
            // PROGRAM VALIDATION
            // ----------------------------------------

            const isGssoc =
              labels.includes('gssoc26');

            const isNsoc =
              labels.includes('nsoc26');

            const isGeneral =
              labels.includes(
                'general-contribution'
              );

            if (
              !isGssoc &&
              !isNsoc &&
              !isGeneral
            ) {

              core.info(
                'Missing program classification'
              );

              return;
            }

            // ----------------------------------------
            // BLOCK INVALID CLASSIFICATION
            // ----------------------------------------

            if (
              labels.includes(
                'missing-program-classification'
              ) ||
              labels.includes(
                'invalid-program-classification'
              )
            ) {

              core.info(
                'Program classification unresolved'
              );

              return;
            }

            // ----------------------------------------
            // LOAD ACTIVE MENTORS
            // ----------------------------------------

            let selectedMentors = [];

            try {

              const raw =
                fs.readFileSync(
                  'selected-mentors.json',
                  'utf8'
                );

              selectedMentors =
                JSON.parse(raw);

            } catch (e) {

              core.warning(
                `Failed loading mentors: ${e.message}`
              );

              return;
            }

            if (
              !Array.isArray(selectedMentors)
            ) {

              core.info(
                'No mentor array found'
              );

              return;
            }

            // ----------------------------------------
            // EXISTING REQUESTS
            // ----------------------------------------

            const { data: requested } =
              await github.rest.pulls
                .listRequestedReviewers({
                  owner,
                  repo,
                  pull_number: prNumber
                });

            const alreadyRequested =
              (requested.users || [])
                .map(u =>
                  u.login.toLowerCase()
                );

            // ----------------------------------------
            // FILTER ELIGIBLE
            // ----------------------------------------

            selectedMentors =
              selectedMentors.filter(
                mentor =>
                  mentor &&
                  mentor.toLowerCase() !==
                    prAuthor &&
                  !alreadyRequested.includes(
                    mentor.toLowerCase()
                  )
              );

            if (
              selectedMentors.length === 0
            ) {

              core.info(
                'No eligible active mentors'
              );

              return;
            }

            // ----------------------------------------
            // LIMIT REQUESTS
            // ----------------------------------------

            selectedMentors =
              selectedMentors.slice(0, 2);

            const successful = [];

            // ----------------------------------------
            // REQUEST REVIEWERS
            // ----------------------------------------

            for (const mentor of selectedMentors) {

              try {

                await github.rest.pulls
                  .requestReviewers({
                    owner,
                    repo,
                    pull_number: prNumber,
                    reviewers: [mentor]
                  });

                successful.push(mentor);

              } catch (e) {

                core.warning(
                  `Failed requesting ${mentor}: ${e.message}`
                );
              }
            }

            if (successful.length === 0) {

              core.info(
                'No reviewer requests succeeded'
              );

              return;
            }

            // ----------------------------------------
            // LABEL
            // ----------------------------------------

            try {

              await github.rest.issues
                .addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: [
                    'mentor-review-requested'
                  ]
                });

            } catch (e) {}

            // ----------------------------------------
            // STICKY COMMENT
            // ----------------------------------------

            const MARKER =
              '<!-- mentor-review-routing -->';

            const body =
              `${MARKER}\n` +
              `## 👥 Stage 2 — Mentor Review\n\n` +

              `Active mentors have been requested for review:\n\n` +

              successful
                .map(m => `- @${m}`)
                .join('\n') +

              `\n\n` +

              `### 📌 Review Requirements\n\n` +

              `- at least 1 mentor approval required\n` +
              `- priority label review required\n` +
              `- quality review enforced\n` +
              `- low-effort approvals are tracked\n\n` +

              `Thank you for contributing 🚀`;

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100
                }
              );

            const existing =
              comments.find(c =>
                c.user &&
                c.user.type === 'Bot' &&
                c.body &&
                c.body.includes(MARKER)
              );

            if (existing) {

              await github.rest.issues
                .updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });

            } else {

              await github.rest.issues
                .createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body
                });
            }

            core.info(
              `Requested mentors: ${successful.join(', ')}`
            );