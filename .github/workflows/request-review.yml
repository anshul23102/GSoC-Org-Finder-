name: Request Reviewers (Stage 2)

on:
  pull_request_target:
    types: [opened, reopened, labeled, ready_for_review]

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request:
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - id: pick
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MAX_REVIEWERS: 2
          EXISTING_REQUESTED: ${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}
          EXISTING_REVIEWERS: ${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}
          RECENT_MENTOR_PINGS: "[]"
        run: echo "result=$(node .github/scripts/select-active-mentors.js)" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@v8
        env:
          SELECTED: ${{ steps.pick.outputs.result }}
        with:
          script: |
            const selected = JSON.parse(process.env.SELECTED || '{}').selected || [];
            if (!selected.length) return;
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            if (!labels.includes('gssoc26') && !labels.includes('nsoc') && !labels.includes('general-oss')) return;
            await github.rest.pulls.requestReviewers({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, reviewers: selected });
